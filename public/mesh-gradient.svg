<svg xmlns="http://www.w3.org/2000/svg" id="mesh-gradient" 
	    width="1000" height="500" viewBox="0 0 1000 500" >
	        <defs>
	            <filter id="blur" filterUnits="userSpaceOnUse" x="0" y="0" width="1000" height="500">
	                <feGaussianBlur stdDeviation="100" />
	            </filter>
	            <filter id="noise" x="0" y="0" width="100%" height="100%">
				<feTurbulence type="fractalNoise" baseFrequency="1" octaves="3" result="turbulence" stitchTiles="stitch" />
				<feBlend in="SourceGraphic" in2="turbulence" mode="overlay" />
			</filter>
	        </defs>
	        <rect id="background" width="100%" height="100%" fill="#2AB573" />
	        <g id="swatches" width="1000" height="500" filter="url(#blur)"><rect x="412.54326894552986" y="42.07323297377371" width="446.98359840110254" height="493.78678664977053" fill="#0E73CA" /><rect x="210.48670173759228" y="-68.03996142224582" width="541.4073915918445" height="507.0866391482753" fill="#4CE03A" /><rect x="96.63674980876212" y="-210.78390968843715" width="347.10736694719714" height="540.6502955237719" fill="#40CFC9" /></g>
	    	<rect x="0" y="0" width="1000" height="500" 
	    	style="mix-blend-mode: soft-light; filter: url(#noise); opacity: 30%"></rect>
    	</svg>